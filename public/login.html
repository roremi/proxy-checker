<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Sign In — VPN Panel</title>
  <style>
    :root{--bg:#0a0f1e;--s1:#0d1525;--s2:#111e33;--s3:#16263e;--b1:#1a2f4a;--b2:#1f3a5a;--t1:#e4eaf4;--t2:#8fa8c8;--t3:#4a6080;--bl:#3d7ef8;--bl2:#6da0fa;--gr:#16c87a;--rd:#f04a4a}
    *{box-sizing:border-box;margin:0;padding:0}
    body{background:var(--bg);color:var(--t1);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;font-size:14px;display:flex;min-height:100vh;align-items:center;justify-content:center;padding:20px}
    .bg-grid{position:fixed;inset:0;background-image:linear-gradient(rgba(61,126,248,.04) 1px,transparent 1px),linear-gradient(90deg,rgba(61,126,248,.04) 1px,transparent 1px);background-size:40px 40px;pointer-events:none}
    .bg-glow{position:fixed;top:-200px;left:50%;transform:translateX(-50%);width:600px;height:600px;background:radial-gradient(circle,rgba(61,126,248,.1) 0%,transparent 70%);pointer-events:none}
    .card{background:var(--s1);border:1px solid var(--b1);border-radius:16px;width:100%;max-width:400px;padding:40px;position:relative;z-index:1;box-shadow:0 30px 80px rgba(0,0,0,.5)}
    .logo{display:flex;align-items:center;gap:12px;margin-bottom:32px;justify-content:center}
    .logo-icon{width:48px;height:48px;background:linear-gradient(135deg,var(--bl),var(--bl2));border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:24px;box-shadow:0 8px 24px rgba(61,126,248,.35)}
    .logo-name{font-size:22px;font-weight:800;color:var(--t1)}
    .logo-sub{font-size:11px;color:var(--t3);margin-top:2px}
    h1{font-size:18px;font-weight:700;margin-bottom:6px;text-align:center}
    .subtitle{font-size:13px;color:var(--t2);text-align:center;margin-bottom:28px}
    .fg{margin-bottom:16px}
    .fg label{display:block;font-size:11px;color:var(--t2);font-weight:600;margin-bottom:6px;text-transform:uppercase;letter-spacing:.05em}
    input[type=password]{width:100%;background:var(--s2);border:1px solid var(--b1);color:var(--t1);border-radius:10px;padding:12px 14px;font-size:14px;outline:none;transition:.15s border-color;font-family:inherit}
    input[type=password]:focus{border-color:var(--bl);box-shadow:0 0 0 3px rgba(61,126,248,.12)}
    ::placeholder{color:var(--t3)}
    .btn-login{width:100%;padding:12px;background:var(--bl);border:none;border-radius:10px;color:#fff;font-size:14px;font-weight:600;cursor:pointer;font-family:inherit;transition:.15s;margin-top:4px;display:flex;align-items:center;justify-content:center;gap:8px}
    .btn-login:hover{opacity:.9}
    .btn-login:disabled{opacity:.5;cursor:not-allowed}
    .error-box{background:rgba(240,74,74,.1);border:1px solid rgba(240,74,74,.25);border-radius:8px;padding:10px 14px;font-size:13px;color:var(--rd);margin-bottom:16px;display:none}
    .error-box.show{display:block}
    .footer-note{text-align:center;font-size:11px;color:var(--t3);margin-top:24px}
    .spin{animation:spin 1s linear infinite;display:inline-block}
    @keyframes spin{to{transform:rotate(360deg)}}
  </style>
</head>
<body>
  <div class="bg-grid"></div>
  <div class="bg-glow"></div>
  <div class="card">
    <div class="logo">
      <div class="logo-icon">⚡</div>
      <div>
        <div class="logo-name" id="brand-name">VPN Panel</div>
        <div class="logo-sub">Admin Console</div>
      </div>
    </div>
    <h1>Sign In</h1>
    <p class="subtitle">Enter your admin password to continue</p>
    <div class="error-box" id="err-box"></div>
    <form id="login-form">
      <div class="fg">
        <label>Admin Password</label>
        <input type="password" id="password" placeholder="Enter password…" autofocus autocomplete="current-password">
      </div>
      <button type="submit" class="btn-login" id="login-btn">
        Sign In
      </button>
    </form>
    <p class="footer-note">VPN Panel v2.0 — Secure Admin Access</p>
  </div>
  <script>
    // If already logged in, skip to dashboard
    if (localStorage.getItem('_admin_token')) {
      location.replace('/dashboard');
    }

    // Try to load brand name (no auth needed for login page, but settings requires token)
    // Just set a default — brand loads after login

    document.getElementById('login-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = document.getElementById('login-btn');
      const errBox = document.getElementById('err-box');
      const pw = document.getElementById('password').value.trim();
      if (!pw) return;

      btn.disabled = true;
      btn.innerHTML = '<span class="spin">↻</span> Signing in…';
      errBox.classList.remove('show');

      try {
        const r = await fetch('/api/admin/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ password: pw })
        });
        const d = await r.json();
        if (!r.ok) {
          errBox.textContent = d.error || 'Login failed';
          errBox.classList.add('show');
          btn.disabled = false;
          btn.textContent = 'Sign In';
          return;
        }
        localStorage.setItem('_admin_token', d.token);
        location.replace('/dashboard');
      } catch (err) {
        errBox.textContent = 'Network error — check server connection';
        errBox.classList.add('show');
        btn.disabled = false;
        btn.textContent = 'Sign In';
      }
    });
  </script>
</body>
</html>
