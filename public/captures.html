<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Network Captures · Proxy Checker</title>
<style>
:root{--bg:#0d1117;--surface:#161b22;--surface2:#21262d;--border:#30363d;--text:#c9d1d9;--dim:#8b949e;--blue:#58a6ff;--green:#3fb950;--red:#f85149;--orange:#d29922;--purple:#bc8cff;--r:6px}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font:13px/1.45 -apple-system,Segoe UI,Roboto,sans-serif}
nav{background:var(--surface);border-bottom:1px solid var(--border);padding:10px 24px;display:flex;gap:4px;align-items:center}
nav strong{color:var(--blue);margin-right:16px}
nav a{color:var(--dim);font-size:13px;padding:6px 12px;border-radius:6px;text-decoration:none}
nav a.active{background:var(--surface2);color:var(--blue)}
.container{display:grid;grid-template-rows:auto auto 1fr;height:calc(100vh - 48px)}
.toolbar{padding:10px 16px;background:var(--surface);border-bottom:1px solid var(--border);display:flex;gap:8px;flex-wrap:wrap;align-items:center}
.toolbar input,.toolbar select,.toolbar button{background:var(--surface2);color:var(--text);border:1px solid var(--border);padding:5px 10px;border-radius:5px;font-size:12px;font-family:inherit}
.toolbar input:focus,.toolbar select:focus{outline:none;border-color:var(--blue)}
.toolbar button{cursor:pointer}
.toolbar button:hover{background:var(--border)}
.toolbar .pill{padding:3px 9px;border-radius:12px;font-size:11px;background:var(--surface2)}
.toolbar .pill .dot{display:inline-block;width:7px;height:7px;border-radius:50%;background:var(--green);margin-right:5px;vertical-align:middle}
.toolbar .pill.off .dot{background:var(--red)}
.stats{padding:6px 16px;font-size:11px;color:var(--dim);background:var(--surface);border-bottom:1px solid var(--border)}
.split{display:grid;grid-template-columns:1fr 520px;overflow:hidden}
.list{overflow-y:auto}
table{width:100%;border-collapse:collapse;font-family:ui-monospace,Menlo,monospace;font-size:12px}
thead{position:sticky;top:0;background:var(--surface);z-index:1}
th{padding:6px 10px;text-align:left;color:var(--dim);font-weight:600;font-size:10px;text-transform:uppercase;border-bottom:1px solid var(--border)}
td{padding:5px 10px;border-bottom:1px solid var(--surface);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:0}
tr{cursor:pointer}
tr:hover td{background:var(--surface)}
tr.sel td{background:rgba(88,166,255,.12)}
.method{font-weight:600;font-size:11px;padding:1px 5px;border-radius:3px;display:inline-block;min-width:42px;text-align:center}
.m-GET{background:rgba(63,185,80,.15);color:var(--green)}
.m-POST{background:rgba(88,166,255,.15);color:var(--blue)}
.m-PUT{background:rgba(210,153,34,.15);color:var(--orange)}
.m-DELETE{background:rgba(248,81,73,.15);color:var(--red)}
.m-PATCH{background:rgba(188,140,255,.15);color:var(--purple)}
.m-HEAD,.m-OPTIONS,.m-CONNECT{background:var(--surface2);color:var(--dim)}
.status{padding:1px 6px;border-radius:3px;font-weight:600;font-size:11px}
.s2{background:rgba(63,185,80,.15);color:var(--green)}
.s3{background:rgba(88,166,255,.15);color:var(--blue)}
.s4{background:rgba(210,153,34,.15);color:var(--orange)}
.s5{background:rgba(248,81,73,.15);color:var(--red)}
.s0{background:rgba(248,81,73,.2);color:var(--red)}
.detail{border-left:1px solid var(--border);overflow-y:auto;padding:14px;background:var(--surface)}
.detail.empty{display:flex;align-items:center;justify-content:center;color:var(--dim);font-size:12px}
.detail h3{font-size:13px;margin:8px 0 6px;color:var(--blue)}
.detail .url{word-break:break-all;font-family:ui-monospace,monospace;font-size:11px;color:var(--text);background:var(--bg);padding:8px;border-radius:4px;margin-bottom:10px;border:1px solid var(--border)}
.tabs{display:flex;gap:4px;border-bottom:1px solid var(--border);margin:10px 0 8px}
.tabs button{background:none;border:none;color:var(--dim);padding:6px 10px;cursor:pointer;font-size:12px;border-bottom:2px solid transparent}
.tabs button.active{color:var(--blue);border-bottom-color:var(--blue)}
.kv{font-family:ui-monospace,monospace;font-size:11px}
.kv .row{display:grid;grid-template-columns:140px 1fr;gap:10px;padding:3px 0;border-bottom:1px solid var(--surface2)}
.kv .row .k{color:var(--dim)}
.kv .row .v{word-break:break-all;color:var(--text)}
pre.body{background:var(--bg);border:1px solid var(--border);border-radius:4px;padding:10px;font-family:ui-monospace,monospace;font-size:11px;white-space:pre-wrap;word-break:break-all;max-height:380px;overflow:auto;color:var(--text)}
.toast{position:fixed;bottom:24px;right:24px;background:var(--surface);border:1px solid var(--border);padding:10px 16px;border-radius:6px;font-size:12px;opacity:0;transition:opacity .2s;z-index:99}
.toast.show{opacity:1}
#login{position:fixed;inset:0;background:var(--bg);z-index:200;display:flex;align-items:center;justify-content:center}
.login-box{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:30px;width:340px}
.login-box h2{font-size:15px;margin-bottom:18px;text-align:center;color:var(--blue)}
.login-box input{width:100%;background:var(--surface2);color:var(--text);border:1px solid var(--border);padding:8px 10px;border-radius:5px;margin-bottom:10px;font-family:inherit}
.login-box button{width:100%;background:var(--blue);color:#000;border:none;padding:8px;border-radius:5px;cursor:pointer;font-weight:600}
.dim{color:var(--dim)}
.tag{display:inline-block;padding:1px 5px;border-radius:3px;background:var(--surface2);font-size:10px;color:var(--dim);margin-left:4px}
.btn-sm{font-size:11px;padding:3px 8px}
</style>
</head>
<body>
<div id="login">
  <div class="login-box">
    <h2>🔒 Captures Login</h2>
    <input id="tok" type="password" placeholder="VPN admin token">
    <button onclick="doLogin()">Enter</button>
    <p style="text-align:center;margin-top:10px;font-size:11px;color:var(--dim)">Default: <code>vpnadmin2026</code></p>
  </div>
</div>
<nav>
  <strong>⚡ Proxy Checker</strong>
  <a href="/">Checker</a>
  <a href="/gateways.html">Gateways</a>
  <a href="/captures.html" class="active">Captures</a>
</nav>

<div class="container" id="app" style="display:none">
  <div class="toolbar">
    <select id="f-gateway"><option value="">All gateways</option></select>
    <select id="f-method">
      <option value="">All methods</option>
      <option>GET</option><option>POST</option><option>PUT</option><option>DELETE</option><option>PATCH</option><option>HEAD</option><option>OPTIONS</option>
    </select>
    <input id="f-host" placeholder="Host contains…" style="width:160px">
    <input id="f-path" placeholder="Path regex/contains…" style="width:160px">
    <select id="f-status">
      <option value="">Any status</option>
      <option value="200,299">2xx</option>
      <option value="300,399">3xx</option>
      <option value="400,499">4xx</option>
      <option value="500,599">5xx</option>
      <option value="0,0">Errors only</option>
    </select>
    <input id="f-q" placeholder="Search URL…" style="width:200px">
    <button onclick="reload()">Apply</button>
    <button onclick="clearFilters()">Clear</button>
    <span style="flex:1"></span>
    <span class="pill" id="ws-status"><span class="dot"></span>Live</span>
    <button class="btn-sm" onclick="downloadCert()">📜 CA cert</button>
    <button class="btn-sm" onclick="clearAll()" style="color:var(--red)">🗑 Clear all</button>
  </div>
  <div class="stats" id="stats">…</div>
  <div class="split">
    <div class="list">
      <table>
        <thead><tr><th>Time</th><th>GW</th><th>Method</th><th>Status</th><th>Host</th><th>Path</th><th style="text-align:right">Size</th><th style="text-align:right">ms</th></tr></thead>
        <tbody id="tbody"></tbody>
      </table>
    </div>
    <div class="detail empty" id="detail">Select a request to view details</div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
let TOKEN = localStorage.getItem('vpn-token') || '';
let WS = null;
let SELECTED = null;
const tbody  = document.getElementById('tbody');
const detail = document.getElementById('detail');
const stats  = document.getElementById('stats');
const fGw=document.getElementById('f-gateway');

function toast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2200);}
function doLogin(){
  const v = document.getElementById('tok').value.trim();
  if(!v) return;
  TOKEN = v; localStorage.setItem('vpn-token', v);
  init();
}
window.addEventListener('DOMContentLoaded', () => {
  if (TOKEN) init(); else document.getElementById('tok').focus();
});

async function init(){
  // Quick auth probe
  const r = await fetch('/api/captures?token=' + encodeURIComponent(TOKEN) + '&limit=1');
  if (r.status === 401) { localStorage.removeItem('vpn-token'); TOKEN=''; toast('Wrong token'); return; }
  document.getElementById('login').style.display = 'none';
  document.getElementById('app').style.display = 'grid';
  await loadGateways();
  await reload();
  await refreshStats();
  setInterval(refreshStats, 15000);
  connectWS();
}

async function loadGateways(){
  try {
    const r = await fetch('/api/gateways?token=' + encodeURIComponent(TOKEN));
    const j = await r.json();
    fGw.innerHTML = '<option value="">All gateways</option>' +
      (j.gateways||[]).map(g => `<option value="${g.name}">${g.name}${g.mitm_running?' 🔓':''}</option>`).join('');
  } catch(_){}
}

function statusClass(s){
  if (!s) return 's0';
  if (s>=500) return 's5';
  if (s>=400) return 's4';
  if (s>=300) return 's3';
  return 's2';
}
function fmtBytes(n){
  if (!n) return '–';
  if (n<1024) return n+'B';
  if (n<1048576) return (n/1024).toFixed(1)+'K';
  return (n/1048576).toFixed(2)+'M';
}
function fmtTime(ts){
  const d = new Date(ts);
  return d.toLocaleTimeString('en-GB', { hour12: false }) + '.' + String(d.getMilliseconds()).padStart(3,'0');
}
function rowHtml(f){
  const m = f.method || '?';
  return `<tr data-id="${f.id}" onclick="select('${f.id}', this)">
    <td title="${new Date(f.ts).toISOString()}">${fmtTime(f.ts)}</td>
    <td><span class="tag">${f.gateway||''}</span></td>
    <td><span class="method m-${m}">${m}</span></td>
    <td><span class="status ${statusClass(f.status)}">${f.status||(f.error?'ERR':'…')}</span></td>
    <td title="${f.host||''}">${f.host||''}</td>
    <td title="${f.path||''}">${f.path||''}</td>
    <td style="text-align:right" class="dim">${fmtBytes(f.res_size)}</td>
    <td style="text-align:right" class="dim">${f.elapsed_ms||0}</td>
  </tr>`;
}

async function reload(){
  const params = new URLSearchParams({ token: TOKEN, limit: 500 });
  if (fGw.value) params.set('gateway', fGw.value);
  if (document.getElementById('f-method').value) params.set('method', document.getElementById('f-method').value);
  if (document.getElementById('f-host').value)   params.set('host_like', document.getElementById('f-host').value);
  if (document.getElementById('f-path').value)   params.set('path_like', document.getElementById('f-path').value);
  if (document.getElementById('f-q').value)      params.set('q', document.getElementById('f-q').value);
  const sv = document.getElementById('f-status').value;
  if (sv) { const [a,b] = sv.split(','); params.set('status_min', a); params.set('status_max', b); }
  const r = await fetch('/api/captures?' + params);
  const j = await r.json();
  tbody.innerHTML = (j.flows||[]).map(rowHtml).join('');
}

function clearFilters(){
  fGw.value=''; document.getElementById('f-method').value='';
  document.getElementById('f-host').value=''; document.getElementById('f-path').value='';
  document.getElementById('f-q').value=''; document.getElementById('f-status').value='';
  reload();
}

async function clearAll(){
  if (!confirm('Delete ALL captured flows?')) return;
  await fetch('/api/captures?token=' + encodeURIComponent(TOKEN), { method: 'DELETE' });
  tbody.innerHTML=''; toast('Cleared'); refreshStats();
}

function downloadCert(){
  const a = document.createElement('a');
  a.href = '/api/mitm/cert.pem'; a.download = 'proxy-checker-ca.pem'; a.click();
}

let activeTab = 'req';
function detailHtml(f){
  const reqBody = b64decodePretty(f.req_body_b64, f.req_headers);
  const resBody = b64decodePretty(f.res_body_b64, f.res_headers);
  return `
    <h3>${f.method} <span class="status ${statusClass(f.status)}">${f.status||'ERR'}</span></h3>
    <div class="url">${escape(f.url||'')}</div>
    <div class="kv">
      <div class="row"><div class="k">Gateway</div><div class="v">${f.gateway}</div></div>
      <div class="row"><div class="k">Client IP</div><div class="v">${f.client_ip||'–'}</div></div>
      <div class="row"><div class="k">Time</div><div class="v">${new Date(f.ts).toISOString()} (${f.elapsed_ms||0}ms)</div></div>
      <div class="row"><div class="k">Sizes</div><div class="v">req ${fmtBytes(f.req_size)}${f.req_truncated?' (truncated)':''} · res ${fmtBytes(f.res_size)}${f.res_truncated?' (truncated)':''}</div></div>
      ${f.error?`<div class="row"><div class="k">Error</div><div class="v" style="color:var(--red)">${escape(f.error)}</div></div>`:''}
    </div>
    <div class="tabs">
      <button class="${activeTab==='req'?'active':''}" onclick="setTab('req')">Request headers</button>
      <button class="${activeTab==='reqb'?'active':''}" onclick="setTab('reqb')">Request body</button>
      <button class="${activeTab==='res'?'active':''}" onclick="setTab('res')">Response headers</button>
      <button class="${activeTab==='resb'?'active':''}" onclick="setTab('resb')">Response body</button>
    </div>
    ${activeTab==='req'  ? headersHtml(f.req_headers) : ''}
    ${activeTab==='reqb' ? `<pre class="body">${escape(reqBody)||'(empty)'}</pre>` : ''}
    ${activeTab==='res'  ? headersHtml(f.res_headers) : ''}
    ${activeTab==='resb' ? `<pre class="body">${escape(resBody)||'(empty)'}</pre>` : ''}
  `;
}
function setTab(t){ activeTab=t; if(SELECTED) renderDetail(SELECTED); }
function escape(s){ return String(s||'').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
function headersHtml(h){
  if (!h || typeof h !== 'object') return '<div class="dim" style="font-size:11px">none</div>';
  return '<div class="kv">' + Object.entries(h).map(([k,v]) =>
    `<div class="row"><div class="k">${escape(k)}</div><div class="v">${escape(v)}</div></div>`
  ).join('') + '</div>';
}
function b64decodePretty(b64, headers){
  if (!b64) return '';
  try {
    const bin = atob(b64);
    const isText = !headers || /text|json|xml|javascript|html|form-urlencoded/i.test(JSON.stringify(headers||{}));
    if (isText) {
      // utf-8 decode
      const bytes = Uint8Array.from(bin, c => c.charCodeAt(0));
      const txt = new TextDecoder('utf-8', { fatal:false }).decode(bytes);
      // pretty JSON
      try { const j = JSON.parse(txt); return JSON.stringify(j, null, 2); } catch(_){}
      return txt;
    }
    return `[binary, ${bin.length} bytes — base64]\n` + b64.match(/.{1,76}/g).slice(0,8).join('\n');
  } catch(e) { return '(decode err: ' + e.message + ')'; }
}

async function select(id, tr){
  document.querySelectorAll('tr.sel').forEach(x => x.classList.remove('sel'));
  if (tr) tr.classList.add('sel');
  const r = await fetch('/api/captures/' + encodeURIComponent(id) + '?token=' + encodeURIComponent(TOKEN));
  if (!r.ok) return;
  SELECTED = await r.json();
  renderDetail(SELECTED);
}
function renderDetail(f){
  detail.classList.remove('empty');
  detail.innerHTML = detailHtml(f);
}

async function refreshStats(){
  try {
    const r = await fetch('/api/captures/_stats?token=' + encodeURIComponent(TOKEN));
    const j = await r.json();
    if (!j.stats || !j.stats.length) { stats.textContent = 'No captures yet — enable MITM on a gateway, then send traffic.'; return; }
    stats.innerHTML = j.stats.map(s =>
      `<b>${s.gateway}</b>: ${s.n} req · ${fmtBytes(s.bytes||0)} · <span style="color:var(--red)">${s.err||0} err</span>`
    ).join(' &nbsp;|&nbsp; ') + ' <span class="dim">(last 1h)</span>';
  } catch(_){}
}

function connectWS(){
  const proto = location.protocol === 'https:' ? 'wss' : 'ws';
  WS = new WebSocket(`${proto}://${location.host}/ws/captures?token=${encodeURIComponent(TOKEN)}`);
  WS.onopen = () => { document.getElementById('ws-status').classList.remove('off'); };
  WS.onclose = () => {
    document.getElementById('ws-status').classList.add('off');
    setTimeout(connectWS, 3000);
  };
  WS.onmessage = (e) => {
    let m; try { m = JSON.parse(e.data); } catch(_) { return; }
    if (m.type === 'flow') {
      // Apply current filters client-side: simplest = always prepend, page reload to re-filter
      const html = rowHtml(m.flow);
      tbody.insertAdjacentHTML('afterbegin', html);
      // Cap visible rows to 500 to keep DOM light
      while (tbody.rows.length > 500) tbody.deleteRow(tbody.rows.length - 1);
    } else if (m.type === 'hello' && Array.isArray(m.recent)) {
      // Show recent ring on initial connection (only when table is empty)
      if (tbody.rows.length === 0) {
        tbody.innerHTML = m.recent.map(rowHtml).join('');
      }
    }
  };
}
</script>
</body>
</html>
