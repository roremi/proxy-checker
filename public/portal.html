<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Customer Portal</title>
<style>
:root{--bg:#09090b;--s1:#141416;--s2:#27272a;--b1:#27272a;--b2:#3f3f46;--t1:#fafafa;--t2:#a1a1aa;--t3:#71717a;--bl:#3b82f6;--bl2:#60a5fa;--gr:#10b981;--rd:#ef4444}
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--t1);font-family:'Inter',-apple-system,sans-serif;letter-spacing:-0.01em;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px}
.card{background:linear-gradient(180deg, var(--s1), #121214);border:1px solid rgba(255,255,255,0.05);border-radius:16px;padding:40px 36px;width:100%;max-width:400px;box-shadow:0 12px 40px -8px rgba(0,0,0,0.8)}
.logo{display:flex;align-items:center;justify-content:center;gap:12px;margin-bottom:32px}
.logo-icon{width:44px;height:44px;background:linear-gradient(135deg,#60a5fa,#3b82f6);border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:22px;box-shadow:0 4px 16px rgba(59,130,246,.4), inset 0 1px 0 rgba(255,255,255,0.3)}
.logo-text{font-size:20px;font-weight:800;color:var(--t1)}
.logo-sub{font-size:12px;color:var(--t3);margin-top:2px}
h2{font-size:17px;font-weight:700;margin-bottom:6px}
.sub{font-size:13px;color:var(--t3);margin-bottom:28px}
.fg{margin-bottom:16px}
.fg label{display:block;font-size:11px;color:var(--t2);font-weight:600;text-transform:uppercase;letter-spacing:.04em;margin-bottom:6px}
input[type=text]{width:100%;border-radius:10px;border:1px solid rgba(255,255,255,0.08);background:rgba(0,0,0,0.25);box-shadow:inset 0 1px 3px rgba(0,0,0,0.3);color:var(--t1);padding:11px 14px;font-size:14px;outline:none;font-family:monospace;transition:.2s}
input:focus{border-color:var(--bl);box-shadow:0 0 0 3px rgba(59,130,246,0.2),inset 0 1px 2px rgba(0,0,0,0.3);background:rgba(0,0,0,0.4)}::placeholder{color:var(--t3);font-family:'Inter',sans-serif}
.btn{width:100%;padding:12px;background:linear-gradient(180deg,#60a5fa,#3b82f6);border:1px solid transparent;border-radius:10px;color:#fff;font-size:14px;font-weight:600;cursor:pointer;transition:.2s cubic-bezier(0.4,0,0.2,1);font-family:inherit;margin-top:4px;box-shadow:0 4px 12px rgba(59,130,246,0.4), inset 0 1px 0 rgba(255,255,255,0.3);text-shadow:0 1px 1px rgba(0,0,0,0.2)}
.btn:hover{box-shadow:0 6px 16px rgba(59,130,246,0.6), inset 0 1px 0 rgba(255,255,255,0.3);filter:brightness(1.1);transform:translateY(-1px)}.btn:disabled{opacity:.5;cursor:not-allowed}
.err{border-radius:10px;border:1px solid rgba(239,68,68,0.2);background:rgba(239,68,68,0.1);color:#ef4444;padding:10px 14px;font-size:13px;margin-bottom:16px;display:none}
.footer{margin-top:28px;text-align:center;font-size:12px;color:var(--t3)}
.footer a{color:var(--bl2);text-decoration:none}.footer a:hover{text-decoration:underline}
</style>
</head>
<body>
<div class="card">
  <div class="logo">
    <div class="logo-icon">&#9889;</div>
    <div><div class="logo-text" id="brand">VPN Panel</div><div class="logo-sub">Customer Portal</div></div>
  </div>
  <h2>Sign in to your account</h2>
  <p class="sub">Enter your API key to access the portal</p>
  <div class="err" id="err-msg"></div>
  <div class="fg">
    <label>API Key</label>
    <input type="text" id="key-input" placeholder="pk_xxxxxxxxxxxxxxxxxxxx" autocomplete="off" spellcheck="false">
  </div>
  <button class="btn" id="login-btn" onclick="doLogin()">Sign In</button>
  <div class="footer">
    API Integration: <a href="/developer" target="_blank" rel="noopener">Developer Docs</a>
    &middot;
    <a href="/openapi-customer.json" target="_blank" rel="noopener">OpenAPI JSON</a>
    <br>
    Admin? <a href="/login">Go to admin login &rarr;</a>
  </div>
</div>
<script>
// Already logged in?
if (localStorage.getItem('_customer_key')) location.replace('/portal-app');

// Load brand name (public)
fetch('/api/admin/settings').then(r=>r.json()).then(d=>{ document.getElementById('brand').textContent=d.brand_name||'VPN Panel'; }).catch(()=>{});

async function doLogin() {
  const key = document.getElementById('key-input').value.trim();
  const errEl = document.getElementById('err-msg');
  const btn = document.getElementById('login-btn');
  errEl.style.display = 'none';
  if (!key) { errEl.textContent = 'Please enter your API key.'; errEl.style.display = 'block'; return; }
  btn.disabled = true; btn.textContent = 'Verifying...';
  try {
    const r = await fetch('/api/key/me', { headers: { 'x-api-key': key } });
    if (!r.ok) { const d = await r.json(); throw new Error(d.error || 'Invalid API key'); }
    localStorage.setItem('_customer_key', key);
    location.replace('/portal-app');
  } catch(e) {
    errEl.textContent = e.message; errEl.style.display = 'block';
    btn.disabled = false; btn.textContent = 'Sign In';
  }
}
document.getElementById('key-input').addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });
</script>
</body>
</html>
