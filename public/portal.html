<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Customer Portal</title>
<style>
:root{--bg:#0a0f1e;--s1:#0d1525;--s2:#111e33;--b1:#1a2f4a;--b2:#1f3a5a;--t1:#e4eaf4;--t2:#8fa8c8;--t3:#4a6080;--bl:#3d7ef8;--bl2:#6da0fa;--gr:#16c87a;--rd:#f04a4a}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--t1);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px}
.card{background:var(--s1);border:1px solid var(--b2);border-radius:16px;padding:40px 36px;width:100%;max-width:400px;box-shadow:0 24px 60px rgba(0,0,0,.5)}
.logo{display:flex;align-items:center;justify-content:center;gap:12px;margin-bottom:32px}
.logo-icon{width:44px;height:44px;background:linear-gradient(135deg,#3d7ef8,#6da0fa);border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:22px;box-shadow:0 6px 18px rgba(61,126,248,.35)}
.logo-text{font-size:20px;font-weight:800;color:var(--t1)}
.logo-sub{font-size:12px;color:var(--t3);margin-top:2px}
h2{font-size:17px;font-weight:700;margin-bottom:6px}
.sub{font-size:13px;color:var(--t3);margin-bottom:28px}
.fg{margin-bottom:16px}
.fg label{display:block;font-size:11px;color:var(--t2);font-weight:600;text-transform:uppercase;letter-spacing:.04em;margin-bottom:6px}
input[type=text]{width:100%;background:var(--s2);border:1px solid var(--b1);color:var(--t1);border-radius:10px;padding:11px 14px;font-size:14px;outline:none;font-family:monospace;transition:.15s}
input:focus{border-color:var(--bl);box-shadow:0 0 0 3px rgba(61,126,248,.1)}::placeholder{color:var(--t3);font-family:inherit}
.btn{width:100%;padding:12px;background:var(--bl);border:none;border-radius:10px;color:#fff;font-size:14px;font-weight:600;cursor:pointer;transition:.15s;font-family:inherit;margin-top:4px}
.btn:hover{opacity:.9}.btn:disabled{opacity:.5;cursor:not-allowed}
.err{background:rgba(240,74,74,.1);border:1px solid rgba(240,74,74,.3);color:var(--rd);padding:10px 14px;border-radius:8px;font-size:13px;margin-bottom:16px;display:none}
.footer{margin-top:28px;text-align:center;font-size:12px;color:var(--t3)}
.footer a{color:var(--bl2);text-decoration:none}.footer a:hover{text-decoration:underline}
</style>
</head>
<body>
<div class="card">
  <div class="logo">
    <div class="logo-icon">&#9889;</div>
    <div><div class="logo-text" id="brand">VPN Panel</div><div class="logo-sub">Customer Portal</div></div>
  </div>
  <h2>Sign in to your account</h2>
  <p class="sub">Enter your API key to access the portal</p>
  <div class="err" id="err-msg"></div>
  <div class="fg">
    <label>API Key</label>
    <input type="text" id="key-input" placeholder="pk_xxxxxxxxxxxxxxxxxxxx" autocomplete="off" spellcheck="false">
  </div>
  <button class="btn" id="login-btn" onclick="doLogin()">Sign In</button>
  <div class="footer">Admin? <a href="/login">Go to admin login &rarr;</a></div>
</div>
<script>
// Already logged in?
if (localStorage.getItem('_customer_key')) location.replace('/portal-app');

// Load brand name (public)
fetch('/api/admin/settings').then(r=>r.json()).then(d=>{ document.getElementById('brand').textContent=d.brand_name||'VPN Panel'; }).catch(()=>{});

async function doLogin() {
  const key = document.getElementById('key-input').value.trim();
  const errEl = document.getElementById('err-msg');
  const btn = document.getElementById('login-btn');
  errEl.style.display = 'none';
  if (!key) { errEl.textContent = 'Please enter your API key.'; errEl.style.display = 'block'; return; }
  btn.disabled = true; btn.textContent = 'Verifying...';
  try {
    const r = await fetch('/api/key/me', { headers: { 'x-api-key': key } });
    if (!r.ok) { const d = await r.json(); throw new Error(d.error || 'Invalid API key'); }
    localStorage.setItem('_customer_key', key);
    location.replace('/portal-app');
  } catch(e) {
    errEl.textContent = e.message; errEl.style.display = 'block';
    btn.disabled = false; btn.textContent = 'Sign In';
  }
}
document.getElementById('key-input').addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });
</script>
</body>
</html>
